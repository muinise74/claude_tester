<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>루틴 목록</title>
<link rel="stylesheet" href="style.css">
<script src="dialog.js"></script>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-logo">🤖 Test Runner<br><span>Puppeteer + Claude</span></div>
    <a class="nav-item" onclick="navigate('skills.html')">📦 스킬</a>
    <a class="nav-item active" onclick="navigate('routines.html')">📋 루틴</a>
    <a class="nav-item" onclick="navigate('results.html')">📊 결과</a>
    <div style="margin-top:auto"></div>
    <a class="nav-item" onclick="navigate('info.html')">ℹ️ 정보</a>
  </nav>

  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">루틴</div>
        <div class="page-subtitle">테스트 루틴 목록 관리</div>
      </div>
      <button class="btn btn-primary" onclick="showCreate()">+ 새 루틴</button>
    </div>

    <div id="list"></div>
    <div id="sentinel" style="height:1px"></div>
    <div id="loadingMore" style="display:none;text-align:center;padding:16px;color:var(--text-muted);font-size:13px">불러오는 중...</div>
  </main>
</div>

<!-- Create Modal -->
<div class="modal-backdrop" id="createModal" style="display:none">
  <div class="modal">
    <h3>새 루틴 만들기</h3>
    <input type="text" id="newName" placeholder="루틴 이름 (영문, 숫자, 한글, -, _)" style="width:100%" />
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="hideCreate()">취소</button>
      <button class="btn btn-primary" onclick="createRoutine()">만들기</button>
    </div>
  </div>
</div>

<script>
function navigate(page) { window.api.navigate(page); }

let offset = 0;
let hasMore = true;
let loading = false;

function renderItems(items) {
  const el = document.getElementById('list');
  if (offset === 0 && !items.length) {
    el.innerHTML = `<div class="empty"><p>루틴이 없습니다.<br>+ 새 루틴으로 시작하세요.</p></div>`;
    return;
  }
  const fragment = items.map(n => {
    const div = document.createElement('div');
    div.className = 'card';
    div.onclick = () => openRoutine(n);
    div.innerHTML = `
      <div class="row">
        <div class="flex-1">
          <div class="card-title">📄 ${n}</div>
          <div class="card-meta">${n}.md</div>
        </div>
        <button class="btn btn-danger" onclick="event.stopPropagation(); deleteRoutine('${n}')">삭제</button>
      </div>`;
    return div;
  });
  fragment.forEach(div => el.appendChild(div));
}

async function loadMore() {
  if (loading || !hasMore) return;
  loading = true;
  document.getElementById('loadingMore').style.display = 'block';

  const res = await window.api.routinesList({ offset });
  hasMore = res.hasMore;
  offset += res.items.length;
  renderItems(res.items);

  document.getElementById('loadingMore').style.display = 'none';
  loading = false;
}

function openRoutine(name) {
  sessionStorage.setItem('routineName', name);
  window.api.navigate('routine-detail.html');
}

async function deleteRoutine(name) {
  if (!await showConfirm(`"${name}" 루틴을 삭제할까요?`)) return;
  await window.api.routinesDelete(name);
  // 목록 초기화 후 재로드
  offset = 0; hasMore = true;
  document.getElementById('list').innerHTML = '';
  loadMore();
}

function showCreate() {
  document.getElementById('createModal').style.display = 'flex';
  document.getElementById('newName').value = '';
  setTimeout(() => document.getElementById('newName').focus(), 50);
}
function hideCreate() { document.getElementById('createModal').style.display = 'none'; }

async function createRoutine() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  const res = await window.api.routinesCreate(name);
  if (!res.ok) { await showAlert(res.error); return; }
  hideCreate();
  sessionStorage.setItem('routineName', res.name);
  sessionStorage.setItem('routineIsNew', '1');
  window.api.navigate('routine-detail.html');
}

document.getElementById('newName').addEventListener('keydown', e => { if (e.key === 'Enter') createRoutine(); });

// IntersectionObserver 무한 스크롤
const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) loadMore();
}, { rootMargin: '100px' });
observer.observe(document.getElementById('sentinel'));

loadMore();
</script>
</body>
</html>
